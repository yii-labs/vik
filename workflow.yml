loop:

workspace:
  root: .vik

agents:
  codex:
    runtime: codex
    model: gpt-5.5
    args:
      --config:
        - model_reasoning_effort=xhigh
  codex-medium:
    runtime: codex
    model: gpt-5.5
    args:
      --config:
        - model_reasoning_effort=medium

issues:
  pull:
    command: >-
      gh project item-list 4 --owner yii-labs --limit 200 --format json
      --query 'repo:yii-labs/vik is:issue is:open status:Digging,Rework,"In Progress",Merging'
      --jq '[.items[] | select((.content.type // .type) == "Issue") | select((.content.repository // .content.repository.nameWithOwner? // .repository // "") == "yii-labs/vik") | (.status // "") as $status | select($status == "Digging" or $status == "Rework" or $status == "In Progress" or $status == "Merging") | {id: ((.content.number? // .number? // ((.content.url // .url // "") | split("/")[-1])) | tostring), title: (.title // .content.title), state: $status, url: (.content.url // .url), project_status: $status, project_item_id: .id}]'
    idle_sec: 120

issue:
  hooks:
    after_create: |
      git clone --depth=1 git@github.com:yii-labs/vik.git .

  stages:
    dig:
      when:
        state: Digging
      agent: codex
      prompt_file: ./.agents/prompts/plan.md

    rework:
      when:
        state: Rework
      agent: codex
      prompt_file: ./.agents/prompts/plan.md

    implement:
      when:
        state: In Progress
      agent: codex
      prompt_file: ./.agents/prompts/implement.md

    merge:
      when:
        state: Merging
      agent: codex-medium
      prompt_file: ./.agents/prompts/merge.md
