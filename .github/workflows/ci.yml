name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  codex-review:
    name: Codex review tooling
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Codex review scripts
        run: |
          bash -n .github/scripts/codex-pr-review.sh
          bash -n .github/scripts/test-codex-pr-review.sh
          bash .github/scripts/test-codex-pr-review.sh

  workflow-config:
    name: Workflow config
    needs: codex-review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Validate Vik workflow config
        env:
          LINEAR_API_KEY: ci-placeholder
        run: cargo run --locked -p vik-cli -- ./WORKFLOW.md --check

  rust:
    name: Rust
    needs: codex-review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check lints
        run: cargo clippy --locked --workspace --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --locked --workspace --all-features
