name: Release

on:
  workflow_call:
    inputs:
      tag:
        description: Release tag to build and publish.
        required: true
        type: string
    secrets:
      CARGO_REGISTRY_TOKEN:
        description: crates.io API token used by cargo publish.
        required: true

permissions: {}

jobs:
  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            binary_name: vik
            asset_name: vik-linux-x86_64
          - os: windows-latest
            binary_name: vik.exe
            asset_name: vik-windows-x86_64.exe
          - os: macos-14
            binary_name: vik
            asset_name: vik-macos-arm64

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        shell: bash
        run: cargo build --release --locked --bin vik

      - name: Stage release binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/release/${{ matrix.binary_name }}" "dist/${{ matrix.asset_name }}"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          if-no-files-found: error

  upload-assets:
    name: Upload release assets
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    permissions:
      actions: read
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Upload assets to draft release
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "${{ inputs.tag }}" dist/* --clobber

  publish-crate:
    name: Publish crate
    runs-on: ubuntu-latest
    needs: upload-assets
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Publish crate
        shell: bash
        run: cargo publish --locked --token "${CARGO_REGISTRY_TOKEN}"
